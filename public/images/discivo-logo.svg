<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="320" height="380">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <radialGradient id="innerCircle" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </radialGradient>
  </defs>

  <!-- Map pin -->
  <path
    d="M160 20 C108 20 68 60 68 112 C68 176 160 300 160 300 C160 300 252 176 252 112 C252 60 212 20 160 20 Z"
    fill="url(#pinGradient)"
  />

  <!-- Inner circle -->
  <circle cx="160" cy="112" r="72" fill="url(#innerCircle)" />

  <!-- Flying discs -->
  <g transform="translate(160, 88) rotate(-18)">
    <ellipse cx="0" cy="0" rx="34" ry="10" fill="#ea580c" />
    <ellipse cx="0" cy="-2" rx="34" ry="9" fill="#f97316" />
    <path d="M-22 -4 Q 0 -10 22 -4" stroke="white" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round" />
    <g stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
      <line x1="-42" y1="-8" x2="-52" y2="-14" />
      <line x1="-36" y1="-2" x2="-48" y2="-2" />
      <line x1="-42" y1="4" x2="-52" y2="-2" />
    </g>
  </g>

  <g transform="translate(132, 118) rotate(12)">
    <ellipse cx="0" cy="0" rx="28" ry="8" fill="#1d4ed8" />
    <ellipse cx="0" cy="-2" rx="28" ry="7" fill="#2563eb" />
    <path d="M-18 -3 Q 0 -8 18 -3" stroke="white" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round" />
    <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65">
      <line x1="34" y1="-6" x2="44" y2="-10" />
      <line x1="30" y1="0" x2="42" y2="0" />
      <line x1="34" y1="6" x2="44" y2="2" />
    </g>
  </g>

  <!-- Disc golf basket -->
  <g transform="translate(160, 198)">
    <rect x="-34" y="-10" width="68" height="8" rx="2" fill="#84cc16" stroke="#3f6212" stroke-width="1" />
    <g stroke="#64748b" stroke-width="2" stroke-linecap="round">
      <path d="M-28 -2 L-8 34" />
      <path d="M28 -2 L8 34" />
      <path d="M-14 -2 L-4 34" />
      <path d="M14 -2 L4 34" />
      <path d="M0 -2 V34" />
    </g>
    <path d="M-36 34 Q 0 42 36 34" fill="none" stroke="#166534" stroke-width="4" />
    <path d="M-38 34 C-38 34 -32 54 0 54 C32 54 38 34 38 34 Z" fill="#16a34a" />
    <rect x="-3" y="54" width="6" height="14" fill="#94a3b8" />
  </g>

  <!-- Brand name -->
  <text
    x="160"
    y="350"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="2"
    fill="#1e3a8a"
  >
    DISCIVO
  </text>
</svg>
